<!DOCTYPE html>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;

      background-size: cover;
      color: #fff;
    }
    header {
      background: rgba(20,40,160,0.8);
      color: white;

      text-align: center;

    }
    .container {
      display: flex;
      flex-direction: column; /* 세로 나열 */
      align-items: center;
      padding: 40px;
    }
    .card {
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      margin: 15px;
      width: 300px;
      text-align: center;
      transition: transform 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: #ffd700;
      font-weight: bold;
      font-size: 18px;
    }
    .card:hover {
      transform: translateY(-5px);
      background: rgba(0,0,0,0.8);
    }
    .card-content {
      padding: 20px;
    }
    footer {
      background: rgba(20,40,160,0.8);
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
