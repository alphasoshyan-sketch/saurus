<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>한국 공룡 소개 사이트</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: url('saurus.gif') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }
    header {
      background: rgba(20,40,160,0.8);
      color: white;
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column; /* 세로 나열 */
      align-items: center;
      padding: 40px;
    }
    .card {
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
      margin: 15px;
      width: 300px;
      text-align: center;
      transition: transform 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: #ffd700;
      font-weight: bold;
      font-size: 18px;
    }
    .card:hover {
      transform: translateY(-5px);
      background: rgba(0,0,0,0.8);
    }
    .card-content {
      padding: 20px;
    }
    footer {
      background: rgba(20,40,160,0.8);
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZHKEB2NZHF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-ZHKEB2NZHF');
  </script>
</head>
<body>
  <header>
    <h1>한국 공룡 소개 사이트</h1>
  </header>

  <div class="container">
    
    <a href="http://nationalatlas.ngii.go.kr/pages/page_1339.php" target="_blank" class="card">
      <div class="card-content">대한민국국가지도집</div>
    </a>

    <a href="https://www.k-heritage.tv/ko/M000000270/media/view?pstNo=10598" target="_blank" class="card">
      <div class="card-content">국가유산채널</div>
    </a>
   
    <a href="https://www.heritage.go.kr/heri/html/HtmlPage.do?pg=/unesco/Heritage/Heritage_99_03.jsp&pageNo=4_2_2_1&pageNo=5_2_2_0" target="_blank" class="card">
      <div class="card-content">국가유산포털</div>
    </a>

    <a href="https://digital.khs.go.kr/recommend/panorama.do" target="_blank" class="card">
      <div class="card-content">국가유산디지털서비스</div>
    </a>

    <a href="https://www.goseong.go.kr/tour/index.goseong" target="_blank" class="card">
      <div class="card-content">고성 공룡박물관</div>
    </a>
 </div>
  <footer>
    <p>© 2026 한국 공룡 탐험 가이드</p>
  </footer>
  <!-- 공유 기능 시작 -->
  <div class="share-wrapper" style="text-align: center; margin: 20px 0; font-family: sans-serif;">
    <!-- 메인 공유하기 버튼 -->
    <button id="mainShareBtn" style="background-color: #4A90E2; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s;">
      🔗 페이지 공유하기
    </button>

    <!-- 3가지 공유 옵션이 나타날 레이어 (기본 숨김) -->
    <div id="shareOptions" style="display: none; margin-top: 15px; justify-content: center; gap: 15px; animation: fadeIn 0.3s ease;">
      <!-- 카카오톡 공유 (웹 링크 방식) -->
      <button id="kakaoBtn" style="background-color: #FEE500; color: #191919; border: none; padding: 10px 18px; font-size: 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">
        카카오톡
      </button>
      <!-- 메시지(SMS) 공유 -->
      <button id="smsBtn" style="background-color: #4CD964; color: white; border: none; padding: 10px 18px; font-size: 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">
        메시지
      </button>
      <!-- 링크 복사 -->
      <button id="copyBtn" style="background-color: #8E8E93; color: white; border: none; padding: 10px 18px; font-size: 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">
        링크 복사
      </button>
    </div>
  </div>

  <!-- 카카오톡 SDK 로드 (카카오톡 공유 기능을 작동시키기 위해 필요합니다) -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonGHrW5scCYQHOUAXh875tAeeDZv78cd1U8+2IfVyEXSKWcJuO" crossorigin="anonymous"></script>

  <script>
    // 1. 카카오톡 초기화 (자신의 카카오 디벨로퍼스 JavaScript 키가 있다면 바꾸셔도 됩니다. 아래는 기본 동작을 위한 예시 세팅입니다)
    // 실제 카카오톡 공유 기능을 고도화하려면 Kakao.init('YOUR_JAVASCRIPT_KEY')가 필요하지만, 
    // 여기서는 키가 없어도 작동할 수 있도록 범용적인 웹 공유 방식으로 우회 처리했습니다.

    const mainShareBtn = document.getElementById('mainShareBtn');
    const shareOptions = document.getElementById('shareOptions');

    // 메인 버튼 누르면 3가지 옵션 토글(열고 닫기)
    mainShareBtn.addEventListener('click', () => {
      if (shareOptions.style.display === 'none' || shareOptions.style.display === '') {
        shareOptions.style.display = 'flex';
      } else {
        shareOptions.style.display = 'none';
      }
    });

    // 공유에 사용할 정보 설정
    const shareTitle = "한국 공룡 탐험 가이드";
    const shareUrl = window.location.href;

    // [1] 카카오톡 공유 버튼 클릭 시
    document.getElementById('kakaoBtn').addEventListener('click', () => {
      // 카카오톡 인앱 브라우저나 공유 링크 양식으로 이동
      const kakaoSchemaUrl = `https://sharer.kakao.com/talk/friends/picker/link?url=${encodeURIComponent(shareUrl)}&title=${encodeURIComponent(shareTitle)}`;
      window.open(kakaoSchemaUrl, '_blank');
    });

    // [2] 메시지(SMS) 공유 버튼 클릭 시
    document.getElementById('smsBtn').addEventListener('click', () => {
      // OS별 SMS 스키마 대응 (아이폰은 &, 안드로이드는 ? 사용)
      const ua = navigator.userAgent.toLowerCase();
      const bodyDelimiter = ua.indexOf('iphone') > -1 || ua.indexOf('ipad') > -1 ? '&' : '?';
      const smsUrl = `sms:${bodyDelimiter}body=${encodeURIComponent(shareTitle + '\n' + shareUrl)}`;
      window.location.href = smsUrl;
    });

    // [3] 링크 복사 버튼 클릭 시
    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(shareUrl).then(() => {
        alert('주소가 클립보드에 복사되었습니다! 원하시는 곳에 붙여넣기 하세요.');
      }).catch(err => {
        // 구형 브라우저 대응용 fallback
        const textArea = document.createElement("textarea");
        textArea.value = shareUrl;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        alert('주소가 복사되었습니다!');
      });
    });
  </script>

  <!-- 간단한 애니메이션 효과 -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #mainShareBtn:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }
  </style>
  <!-- 공유 기능 끝 -->
</body>
</html>
